<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        .poppins { font-family: 'Poppins', sans-serif; }
        
        /* Subtle animation for the links */
        @keyframes linkPulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        .animate-link-pulse {
            animation: linkPulse 3s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-slate-50 poppins">

    <section class="relative w-full bg-slate-950 pt-16 pb-20 overflow-hidden border-b-4 border-emerald-500">
        
        <div class="absolute inset-0 opacity-10">
            <div class="absolute -top-10 -left-10 w-64 h-64 bg-emerald-500 rounded-full blur-[120px]"></div>
            <div class="absolute -bottom-20 -right-20 w-80 h-80 bg-emerald-400 rounded-full blur-[150px]"></div>
            
            <div class="absolute inset-0 bg-[radial-gradient(#e2e8f0_1px,transparent_1px)] [background-size:30px_30px] opacity-20"></div>
        </div>

        <div class="container mx-auto px-6 relative z-10">
            <div class="flex flex-col md:flex-row items-center justify-between gap-12">
                
                <div class="md:w-3/5 text-center md:text-left">
                    <nav class="flex items-center justify-center md:justify-start gap-2 text-[10px] font-bold uppercase tracking-[0.3em] text-slate-500 mb-5">
                        <a href="index.html" class="hover:text-emerald-400 transition-colors">Home</a>
                        <span class="w-1 h-1 bg-emerald-700 rounded-full"></span>
                        <a href="#" class="text-slate-400">Policies</a>
                    </nav>

                    <h1 class="text-4xl md:text-5xl lg:text-6xl font-black text-white leading-none tracking-tighter uppercase italic">
                        Hyperlinking<br>
                        <span class="text-emerald-500 font-light">Policy</span>
                    </h1>

                    <div class="flex items-center gap-2 mt-4 mb-6 justify-center md:justify-start">
                        <span class="h-1 w-20 bg-emerald-600 rounded-full"></span>
                        <span class="w-2.5 h-2.5 rotate-45 bg-emerald-400 rounded-sm"></span>
                        <span class="h-1 w-10 bg-emerald-600 rounded-full"></span>
                    </div>

                    <p class="text-slate-400 text-base md:text-lg font-medium leading-relaxed max-w-xl mx-auto md:mx-0">
                        Guidelines and regulations governing links to external websites from the RBSK portal and vice versa.
                    </p>
                </div>

                <div class="md:w-2/5 flex justify-center md:justify-end relative">
                    <div class="absolute inset-0 flex items-center justify-center">
                        <div class="w-72 h-72 border border-emerald-500/20 rounded-full animate-[spin_20s_linear_infinite]"></div>
                    </div>

                    <div class="relative bg-emerald-950/40 p-6 rounded-[3rem] border border-emerald-500/10 shadow-2xl backdrop-blur-sm">
                        <div class="w-48 h-48 bg-slate-900 rounded-[2.5rem] flex items-center justify-center relative overflow-hidden group shadow-inner">
                            
                            <div class="absolute inset-0 bg-[radial-gradient(#10b981_1px,transparent_1px)] [background-size:15px_15px] opacity-10"></div>

                            <div class="relative z-10 flex flex-col items-center">
                                <i class="fa-solid fa-file-signature text-6xl text-emerald-500 group-hover:scale-110 transition-transform"></i>
                                <div class="absolute -bottom-2 -right-2 flex items-center justify-center w-12 h-12 bg-slate-950 rounded-xl border border-emerald-500/30 animate-link-pulse">
                                    <i class="fa-solid fa-link text-xl text-emerald-400"></i>
                                </div>
                            </div>
                        </div>
                        
                        <div class="absolute -top-3 -left-3 bg-emerald-600 text-slate-950 px-4 py-1.5 rounded-full shadow-lg border-2 border-slate-950">
                            <span class="text-[9px] font-black uppercase tracking-[0.2em]">Official Policy</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>

</body>
</html>
