    <script src="assets/js/app.js"></script>
    <script>
       window.openModal = function(index) {
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImg');
    
    // 1. Saari gallery images ko select karein
    const allGalleryItems = document.querySelectorAll('.gallery-item img');
    
    // 2. Index ke hisaab se sahi image ka 'src' (path) nikalein
    if (allGalleryItems[index]) {
        const imagePath = allGalleryItems[index].getAttribute('src');
        
        // 3. Modal image ka src set karein
        modalImg.src = imagePath;
        
        // 4. Modal dikhayein
        modal.classList.remove('modal-hidden');
        document.body.style.overflow = 'hidden';

        // 5. Visibility classes handle karein
        setTimeout(() => {
            modalImg.classList.remove('opacity-0', 'scale-95');
            modalImg.classList.add('opacity-100', 'scale-100');
        }, 50);

        // Current index ko global variable mein update karein taaki arrows kaam karein
        window.currentIndex = index;
    } else {
        console.error("Image not found at index:", index);
    }
};

// Arrows ke liye path update karne ka function
window.updateModalPath = function() {
    const allGalleryItems = document.querySelectorAll('.gallery-item img');
    const modalImg = document.getElementById('modalImg');
    
    if (allGalleryItems[window.currentIndex]) {
        modalImg.src = allGalleryItems[window.currentIndex].getAttribute('src');
    }
};

window.nextImage = function() {
    const total = document.querySelectorAll('.gallery-item img').length;
    window.currentIndex = (window.currentIndex + 1) % total;
    window.updateModalPath();
};

window.prevImage = function() {
    const total = document.querySelectorAll('.gallery-item img').length;
    window.currentIndex = (window.currentIndex - 1 + total) % total;
    window.updateModalPath();
};
    </script>
