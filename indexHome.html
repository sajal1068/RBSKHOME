<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBSK Redesign | Accessibility Ready</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/i18next/dist/umd/i18next.min.js"></script>
    <style>
        .high-contrast {
            background-color: #000000 !important;
            color: #ffff00 !important;
        }


        .high-contrast section,
        .high-contrast div,
        .high-contrast header,
        .high-contrast footer,
        .high-contrast nav {
            background-color: #000000 !important;
            background-image: none !important;
            border-color: #ffff00 !important;
            color: #ffff00 !important;
        }

        /* Target text elements */
        .high-contrast h1,
        .high-contrast h2,
        .high-contrast h3,
        .high-contrast h4,
        .high-contrast h5,
        .high-contrast h6,
        .high-contrast p,
        .high-contrast span,
        .high-contrast a,
        .high-contrast li {
            color: #ffff00 !important;
        }

        /* Target Buttons and Interactive Elements */
        .high-contrast button {
            background-color: #000000 !important;
            color: #ffff00 !important;
            border: 2px solid #ffff00 !important;
        }

        .high-contrast {
            background-color: #000 !important;
            color: #ffff00 !important;
        }

        /* Target the Accessibility Bar specifically */
        .high-contrast div[class*="bg-[#f8fafc]"] {
            background-color: #111111 !important;
            border-color: #ffff00 !important;
        }

        /* Fix for all buttons in high contrast */
        .high-contrast button {
            background-color: #000 !important;
            color: #ffff00 !important;
            border: 1px solid #ffff00 !important;
        }

        /* Normal state for buttons */
        .font-btn {
            transition: all 0.3s ease;
            color: #475569;
            /* slate-600 */
        }

        /* Active state - isse green color fix hoga */
        .font-btn.active {
            background-color: #059669 !important;
            /* emerald-600 */
            color: white !important;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            400: '#94a3b8',
                            500: '#64748b',
                            800: '#1e293b',
                            900: '#0f172a',
                        },
                        teal: {
                            100: '#ccfbf1',
                            400: '#2dd4bf',
                            600: '#0d9488',
                        },
                        blue: {
                            100: '#dbeafe',
                            600: '#2563eb',
                        },
                    },
                },
            },
        }
    </script>
    <style>
        /* Custom class for the dashed connector line, ensuring it spans correctly */
        .bg-dashed-line {
            background-image: linear-gradient(to right, #f1f5f9 50%, rgba(255, 255, 255, 0) 0%);
            background-position: bottom;
            background-size: 15px 2px;
            background-repeat: repeat-x;
        }
    </style>
</head>

            <div class="flex items-center gap-1 bg-slate-200/50 p-1 rounded-lg border border-slate-200 w-fit">
                <button onclick="changeFontSize('small', this)"

                <button onclick="changeFontSize('normal', this)" class="font-btn active px-3 py-1 rounded-md font-bold">

                <button onclick="changeFontSize('large', this)"
                    class="font-btn px-3 py-1 hover:bg-white rounded-md transition-all font-bold text-slate-600">

                </button>
            </div>
            <div class="flex items-center gap-2 md:gap-3">

                    <option value="en">English</option>
                    <option value="hi">हिन्दी</option>
                </select>
            </div>
        </div>
    </div>
