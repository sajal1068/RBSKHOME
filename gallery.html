<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBSK Redesign | Accessibility Ready</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/i18next/dist/umd/i18next.min.js"></script>
    <link href="assets/css/style.css" rel="stylesheet">  
</head>

<body class="transition-all duration-300">
 <div id="header-placeholder"></div>


    <header class="bg-white py-12 border-b border-slate-100">
        <div class="container mx-auto px-6 text-center">
            <h1 class="text-4xl font-black text-slate-900 mb-4">Event Gallery</h1>
            <p class="text-slate-500 max-w-xl mx-auto font-medium">Capture the moments of RBSK health camps, screening drives, and success stories across the nation.</p>
        </div>
    </header>

    <main class="container mx-auto px-6 py-16">
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            
            <div class="group relative overflow-hidden rounded-[2rem] bg-slate-200 aspect-square cursor-pointer shadow-sm hover:shadow-xl transition-all" onclick="openModal('https://images.unsplash.com/photo-1581056771107-24ca5f033842?q=80&w=1200')">
                <img src="https://images.unsplash.com/photo-1581056771107-24ca5f033842?q=80&w=600" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                <div class="absolute inset-0 bg-emerald-600/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                    <i class="fa-solid fa-expand text-white text-3xl"></i>
                </div>
            </div>

            <div class="group relative overflow-hidden rounded-[2rem] bg-slate-200 aspect-square cursor-pointer shadow-sm hover:shadow-xl transition-all" onclick="openModal('https://images.unsplash.com/photo-1576091160550-2173dba999ef?q=80&w=1200')">
                <img src="https://images.unsplash.com/photo-1576091160550-2173dba999ef?q=80&w=600" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                <div class="absolute inset-0 bg-emerald-600/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                    <i class="fa-solid fa-expand text-white text-3xl"></i>
                </div>
            </div>

            <div class="group relative overflow-hidden rounded-[2rem] bg-slate-200 aspect-square cursor-pointer shadow-sm hover:shadow-xl transition-all" onclick="openModal('https://images.unsplash.com/photo-1516549655169-df83a0774514?q=80&w=1200')">
                <img src="https://images.unsplash.com/photo-1516549655169-df83a0774514?q=80&w=600" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                <div class="absolute inset-0 bg-emerald-600/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                    <i class="fa-solid fa-expand text-white text-3xl"></i>
                </div>
            </div>

            <div class="group relative overflow-hidden rounded-[2rem] bg-slate-200 aspect-square cursor-pointer shadow-sm hover:shadow-xl transition-all" onclick="openModal('https://plus.unsplash.com/premium_photo-1664475477169-46b784084d4e?q=80&w=1200')">
                <img src="https://plus.unsplash.com/premium_photo-1664475477169-46b784084d4e?q=80&w=600" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                <div class="absolute inset-0 bg-emerald-600/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                    <i class="fa-solid fa-expand text-white text-3xl"></i>
                </div>
            </div>

        </div>
    </main>

    <div id="imageModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950/90 backdrop-blur-sm modal-hidden modal">
        <button onclick="closeModal()" class="absolute top-6 right-6 text-white text-4xl hover:text-emerald-500 transition">
            <i class="fa-solid fa-xmark"></i>
        </button>
        
        <div class="max-w-5xl max-h-[85vh] p-4">
            <img id="modalImg" src="" class="rounded-3xl shadow-2xl object-contain max-h-[80vh] mx-auto border-4 border-white/10">
        </div>
    </div>

    <script>
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImg');

        function openModal(imgSrc) {
            modalImg.src = imgSrc;
            modal.classList.remove('modal-hidden');
            document.body.style.overflow = 'hidden'; // Stop scroll
        }

        function closeModal() {
            modal.classList.add('modal-hidden');
            document.body.style.overflow = 'auto'; // Enable scroll
            setTimeout(() => { modalImg.src = ''; }, 300); // Clear src after fade
        }

        // Close modal if clicking outside the image
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });
    </script>

 <div id="footer-placeholder"></div>
    <script src="assets/js/app.js"></script>
</body>
</html>
