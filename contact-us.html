     <style>

    background-color: #000000 !important;
    color: #ffff00 !important;
    }
    .high-contrast section,
    .high-contrast div,
    .high-contrast header,
    .high-contrast footer,
    .high-contrast nav {
    background-color: #000000 !important;
    background-image: none !important;
    border-color: #ffff00 !important;
    color: #ffff00 !important;
    }        
    .high-contrast h1,
    .high-contrast h2,
    .high-contrast h3,
    .high-contrast h4,
    .high-contrast h5,
    .high-contrast h6,
    .high-contrast p,
    .high-contrast span,
    .high-contrast a,
    .high-contrast li {
    color: #ffff00 !important;
    }        
    .high-contrast button {
    background-color: #000000 !important;
    color: #ffff00 !important;
    border: 2px solid #ffff00 !important;
    }
    .high-contrast {
    background-color: #000 !important;
    color: #ffff00 !important;
    }        
    .high-contrast div[class*="bg-[#f8fafc]"] {
    background-color: #111111 !important;
    border-color: #ffff00 !important;
    }        
    .high-contrast button {
    background-color: #000 !important;

<body class="transition-all duration-300">

                                <span class="w-1 h-1 bg-emerald-300 rounded-full"></span>
                                <span class="text-white">Contact Us</span>

                            <h1 class="text-3xl md:text-5xl font-black text-white leading-tight tracking-tighter">
                                Contact Us

    <main id="main">





        <section class="py-16 bg-slate-50">
            <div class="container mx-auto px-6 max-w-6xl">
                
                    
                        <div
                            class="relative overflow-hidden bg-white border-[5px] border-white border-b-0 rounded-[25px] min-h-[450px] contact-shadow mb-10">

                            <div class="w-full h-full">
                                <iframe
                                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3502.551790447385!2d77.2104107!3d28.6132049!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x390cfd4669866163%3A0xb33984e1b8c148e!2sNirman%20Bhawan!5e0!3m2!1sen!2sin!4v1625000000000!5m2!1sen!2sin"

                                </iframe>
                            </div>

                            <div id="contactInfo"
                                class="absolute right-0 top-[18%] h-[250px] w-[320px] p-[40px_35px] rounded-l-[25px] bg-[#022759]/80 text-white transition-transform duration-500 ease-in-out">

                                <div id="toggleArrow"
                                    class="absolute -left-4 top-[45%] w-5 h-8 bg-[#ffcb00] rounded-sm flex items-center justify-center cursor-pointer p-[3px] transition-all duration-500">
                                    <svg class="w-full h-full fill-current text-black transform transition-transform duration-500"
                                        id="arrowSvg" viewBox="0 0 492.004 492.004">
                                        <path
                                            d="M382.678,226.804L163.73,7.86C158.666,2.792,151.906,0,144.698,0s-13.968,2.792-19.032,7.86l-16.124,16.12 c-10.492,10.504-10.492,27.576,0,38.064L293.398,245.9l-184.06,184.06c-5.064,5.068-7.86,11.824-7.86,19.028 c0,7.212,2.796,13.968,7.86,19.04l16.124,16.116c5.068,5.068,11.824,7.86,19.032,7.86s13.968-2.792,19.032-7.86L382.678,265 c5.076-5.084,7.864-11.872,7.848-19.088C390.542,238.668,387.754,231.884,382.678,226.804z" />
                                    </svg>
                                </div>

                                <div class="leading-relaxed">
                                    <strong class="text-xl block pb-2">Ministry of Health & Family Welfare,</strong>
                                    <div class="text-base mt-2">Nirman Bhawan,</div>
                                    <div class="text-base">New Delhi - 110011</div>
                                    <div class="text-base">Ph: 91-011-23061281(O)</div>
                                </div>
                            </div>

                        </div>
                    
                
            </div>
        </section>

       









    </main>


    <div id="footer-placeholder"></div>
    <script src="assets/js/app.js"></script>
    <script>
        const arrow = document.getElementById('toggleArrow');
        const infoSec = document.getElementById('contactInfo');
        const arrowSvg = document.getElementById('arrowSvg');

        arrow.addEventListener('click', () => {
            // Toggle the slide class
            infoSec.classList.toggle('move-class');
            
            // Rotate the arrow icon when clicked
            arrowSvg.classList.toggle('rotate-180');
        });
    </script>
